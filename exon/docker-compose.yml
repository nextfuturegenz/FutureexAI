services:
  exon-api:
    build:
      context: ..
      dockerfile: exon/Dockerfile
    network_mode: host  # This makes container use host's network directly
    environment:
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_NAME=brain
      - DB_USER=master
      - DB_PASSWORD=2307
      - OLLAMA_HOST=http://localhost:11434
      - OLLAMA_MODEL=phi3:mini
      - EXON_ID=EXN-001
      - KNOWLEDGE_DIR=/app/knowledge
    volumes:
      - ../:/app
    restart: unless-stopped